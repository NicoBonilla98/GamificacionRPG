<!-- @dsCard group="Components" viewport="700x540" name="Core" subtitle="Buttons, pills, cards, progress, rarity & attribute meters" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; }
  .wrap { display: grid; gap: 22px; max-width: 660px; }
  .group { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .lbl { font: var(--type-label); letter-spacing: var(--track-label); text-transform: uppercase; color: var(--hl-faint); margin-bottom: 10px; }
  .seg { display: grid; gap: 10px; }
  h4 { margin: 0 0 6px; font: var(--type-h4); color: var(--hl-ink); }
  .eyebrow { color: var(--hl-attr-str); }
</style>
</head>
<body>
  <div id="root" class="wrap"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Pill, ProgressBar, Card, RarityTag, AttributeMeter } = window.HeroSLedgerDesignSystem_858ec3;

    function Demo() {
      return (
        <>
          <div className="seg">
            <div className="lbl">Buttons</div>
            <div className="group">
              <Button variant="primary">Comenzar</Button>
              <Button variant="complete" icon="✓">Completar</Button>
              <Button variant="mini">Elegir</Button>
              <Button variant="ghost">Cierre del día</Button>
              <Button variant="danger">Abandonar</Button>
              <Button variant="primary" disabled>Bloqueado</Button>
            </div>
          </div>

          <div className="seg">
            <div className="lbl">Pills</div>
            <div className="group">
              <Pill>3 pendientes</Pill>
              <Pill tone="gold" icon="🗝">2 llaves</Pill>
              <Pill tone="green">×1.4 XP</Pill>
              <Pill tone="violet">Roster narrativo</Pill>
              <Pill tone="danger">En descanso</Pill>
            </div>
          </div>

          <div className="seg">
            <div className="lbl">Progress</div>
            <div className="group" style={{ display: "grid", gap: "12px", maxWidth: "100%" }}>
              <ProgressBar kind="xp" value={420} max={800} />
              <ProgressBar kind="hp" value={820} max={1200} label="820 / 1200 PV" />
              <ProgressBar kind="attr" value={32} max={50} color="var(--hl-attr-str)" />
            </div>
          </div>

          <div className="seg">
            <div className="lbl">Cards</div>
            <div className="group" style={{ alignItems: "stretch" }}>
              <Card accent="var(--hl-attr-str)" style={{ flex: "1", minWidth: "260px" }}>
                <span className="hl-eyebrow eyebrow">Fuerza · STR</span>
                <h4>⚔ Forja del Cuerpo</h4>
                <p style={{ color: "var(--hl-muted)", fontFamily: "var(--font-body)" }}>30 min de entrenamiento de fuerza.</p>
              </Card>
              <Card accent="var(--hl-green)" active style={{ flex: "1", minWidth: "200px" }}>
                <span className="hl-eyebrow" style={{ color: "var(--hl-green)" }}>NPC · Sanador</span>
                <h4 style={{ color: "var(--hl-ink)" }}>Seleccionado</h4>
                <div style={{ marginTop: "10px" }}><RarityTag rarity="rare" /> <RarityTag rarity="epic" /></div>
              </Card>
            </div>
          </div>

          <div className="seg">
            <div className="lbl">Attribute meters</div>
            <AttributeMeter attr="STR" value={32} max={50} bonus={4} next={50} />
            <AttributeMeter attr="FOC" value={18} max={50} next={25} />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
