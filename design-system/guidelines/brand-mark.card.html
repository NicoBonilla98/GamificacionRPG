<!-- @dsCard group="Brand" viewport="700x230" name="The Ledger mark" subtitle="An open grimoire in gold — the app's emblem" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px; display: flex; gap: 32px; align-items: center; }
  .mark { width: 110px; height: 110px; border: 3px solid var(--hl-gold); border-radius: 50%; display: grid; place-items: center; background: #1b1512; box-shadow: var(--glow-gold); flex: 0 0 auto; }
  .mark img { width: 68%; height: 68%; }
  .lockup { display: flex; flex-direction: column; gap: 6px; }
  .word { font: var(--type-hero); font-size: 3.4rem; line-height: 0.9; color: var(--hl-gold); text-transform: uppercase; text-shadow: var(--text-engrave-glow); }
  .tag { font: var(--type-body); color: var(--hl-muted); }
</style>
</head>
<body>
  <div class="mark"><img src="../assets/ledger-mark.svg" alt="Hero's Ledger mark"></div>
  <div class="lockup">
    <div class="word">Hero's<br>Ledger</div>
    <div class="tag">Convierte tus hábitos reales en leyenda.</div>
  </div>
</body>
</html>
