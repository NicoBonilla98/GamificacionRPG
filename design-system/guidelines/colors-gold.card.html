<!-- @dsCard group="Colors" viewport="700x150" name="Gold — the hero metal" subtitle="The single accent: headings, CTAs, highlights, glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .sw { flex: 1; }
  .chip { height: 76px; border-radius: 10px; }
  .nm { margin-top: 8px; font: var(--type-micro); color: var(--hl-ink); text-transform: none; }
  .vl { font: var(--type-micro); color: var(--hl-muted); font-weight: 400; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--hl-gold-bright)"></div><div class="nm">gold-bright</div><div class="vl">#FFE172</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-gold);box-shadow:var(--glow-gold)"></div><div class="nm">gold ★</div><div class="vl">#F2CC45</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-gold-deep)"></div><div class="nm">gold-deep</div><div class="vl">#A88919</div></div>
    <div class="sw"><div class="chip" style="background:var(--grad-gold-button)"></div><div class="nm">grad-gold-button</div><div class="vl">CTA face</div></div>
    <div class="sw"><div class="chip" style="background:var(--grad-gold-bar)"></div><div class="nm">grad-gold-bar</div><div class="vl">XP fill</div></div>
  </div>
</body>
</html>
