<!-- @dsCard group="Brand" viewport="700x210" name="Pixel sprites" subtitle="Crisp 16-bit actors for the diegetic battle screen" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; }
  .stage { height: 160px; position: relative; border-radius: 10px; border: 1px solid rgba(242,204,69,0.22); background: var(--bg-stage); box-shadow: var(--shadow-well-deep); overflow: hidden; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 40px 26px; }
  .stage::after { content: ""; position: absolute; left: 20px; right: 20px; bottom: 18px; height: 10px; border-radius: 50%; background: rgba(0,0,0,0.48); filter: blur(5px); }
  .lab { position: absolute; top: 10px; left: 14px; font: 900 0.68rem/1 var(--font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: var(--hl-faint); }
  img { width: 104px; height: 104px; image-rendering: pixelated; position: relative; z-index: 2; filter: drop-shadow(0 10px 0 rgba(0,0,0,0.24)); }
  .mon { width: 118px; height: 118px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="lab">Pixel Battle</div>
    <img src="../assets/pixel-hero.svg" alt="Hero sprite">
    <img class="mon" src="../assets/pixel-monster.svg" alt="Monster sprite">
  </div>
</body>
</html>
