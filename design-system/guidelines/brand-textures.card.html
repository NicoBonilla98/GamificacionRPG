<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; display: flex; gap: 16px; }
  .tile { flex: 1; height: 150px; border-radius: 10px; border: 1px solid var(--border-panel); position: relative; overflow: hidden; }
  .nm { position: absolute; left: 12px; bottom: 10px; font: var(--type-micro); color: var(--hl-ink); text-transform: none; text-shadow: 0 1px 4px #000; }
  .page { background: var(--bg-page); background-size: var(--bg-page-size); }
  .shell { background: var(--bg-shell); }
  .stage { background: var(--bg-stage); box-shadow: var(--shadow-well-deep); }
</style>
</head>
<body>
  <div class="tile page"><div class="nm">bg-page · gold sun + grid</div></div>
  <div class="tile shell"><div class="nm">bg-shell · ribbed board</div></div>
  <div class="tile stage"><div class="nm">bg-stage · CRT scanlines</div></div>
</body>
</html>
