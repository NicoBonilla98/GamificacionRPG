<!-- @dsCard group="Colors" viewport="700x190" name="Surfaces & Ink" subtitle="Warm near-black browns lit by a single gold source" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 150px; }
  .chip { height: 70px; border-radius: 10px; border: 1px solid var(--border-panel); box-shadow: var(--shadow-well); }
  .nm { margin-top: 8px; font: var(--type-micro); color: var(--hl-ink); text-transform: none; }
  .vl { font: var(--type-micro); color: var(--hl-muted); font-weight: 400; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--hl-bg-deep)"></div><div class="nm">bg-deep</div><div class="vl">#0F0B09</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-bg)"></div><div class="nm">bg</div><div class="vl">#15100D</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-panel)"></div><div class="nm">panel</div><div class="vl">#2A2421</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-panel-soft)"></div><div class="nm">panel-soft</div><div class="vl">#352D29</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-ink);border:none"></div><div class="nm">ink</div><div class="vl">#FFF6ED</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-muted);border:none"></div><div class="nm">muted</div><div class="vl">#C4B8B0</div></div>
    <div class="sw"><div class="chip" style="background:var(--hl-line);border:none"></div><div class="nm">line</div><div class="vl">#4A3F39</div></div>
  </div>
</body>
</html>
